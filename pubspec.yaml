name: gulanow
description: "GulaNow - A modern e-commerce mobile application built with Flutter, Firebase, and GetX state management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  provider: ^6.0.0
  intl: ^0.19.0
  http: ^1.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_paypal: ^0.2.0
  razorpay_flutter: ^1.3.6
  uuid: ^4.0.0
  share_plus: ^7.2.0
  image_picker: ^1.0.4
  permission_handler: ^11.4.4
  animated_splash_screen: ^1.3.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  badges: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600